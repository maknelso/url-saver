name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      # This spins up a real Postgres DB for your tests!
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: url_saver_db
          POSTGRES_USER: nelson
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto' # Using Amazon Corretto since you're familiar with AWS
          cache: maven

      - name: Build with Maven
        run: mvn -B clean test