spring.application.name=url-saver

# PostgreSQL Configuration
# Note: Database name defaults to 'postgres' in your Docker Compose
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=password

# Hibernate Settings
# 'update' will create the 'url' table for you automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Optional: Format the SQL in the console to make it readable
spring.jpa.properties.hibernate.format_sql=true